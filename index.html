<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>void</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { overflow: hidden; font-family: sans-serif; width: 100vw; height: 100vh; background: #000; color: white; }

  .blackhole {
    width: 200px; height: 200px; border-radius: 50%;
    background: radial-gradient(circle, #000 40%, #111 60%, transparent 70%);
    box-shadow: 0 0 80px rgba(255,255,255,0.08);
    animation: pulse 3s infinite ease-in-out;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  .vent-text {
    position: fixed; color: white; pointer-events: none; font-size: 16px;
    animation: spiral 1.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; z-index: 100;
  }
  @keyframes spiral {
    0% { opacity:1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity:0; transform: translate(var(--dx), var(--dy)) scale(0) rotate(720deg); filter: blur(4px); }
  }

  #void { width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #universe { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
  .hidden { display: none !important; }

  .star-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

  textarea {
    background: transparent; border: 1px solid #444; color: white; padding: 12px;
    width: 320px; text-align: center; resize: none; border-radius: 4px; font-size: 16px;
    outline: none; position: relative; z-index: 10;
  }

  .hint { position: fixed; bottom: 24px; font-size: 13px; color: #555; text-align: center; z-index: 10; padding: 0 20px; }

  button#switchBtn {
    position: fixed; top: 16px; right: 16px; z-index: 50;
    padding: 4px 16px; border: 1px solid #888; background: transparent;
    color: white; border-radius: 4px; cursor: pointer; font-size: 14px;
  }

  .plane-svg {
    position: fixed; z-index: 9999; pointer-events: none;
    transform-origin: center center;
  }
  .plane-svg.animate {
    animation: flyAway 1.8s ease-in forwards;
  }
  @keyframes flyAway {
    0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    30%  { transform: translate(calc(var(--dx)*0.2), calc(var(--dy)*0.1)) scale(0.9) rotate(-10deg); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2) rotate(30deg); }
  }
</style>
</head>
<body>

<button id="switchBtn" onclick="toggleMode()">switch</button>

<div id="void">
  <div class="blackhole" id="blackhole" style="margin-bottom: 40px;"></div>
  <textarea id="voidInput" rows="3" placeholder="..."></textarea>
  <p class="hint">write what's bothering you and let it vanish into the void</p>
</div>

<div id="universe" class="hidden">
  <canvas class="star-canvas" id="starCanvas"></canvas>
  <textarea id="universeInput" rows="3" placeholder="..."></textarea>
  <p class="hint" style="color:#666;">write what you want from the universe and let your energy flow</p>
</div>

<script>
let mode = "void";

function toggleMode() {
  const v = document.getElementById("void");
  const u = document.getElementById("universe");
  if (mode === "void") {
    v.classList.add("hidden");
    u.classList.remove("hidden");
    mode = "universe";
    initStars();
  } else {
    u.classList.add("hidden");
    v.classList.remove("hidden");
    mode = "void";
  }
}

let starsInited = false;
function initStars() {
  if (starsInited) return;
  starsInited = true;
  const canvas = document.getElementById("starCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = Array.from({length: 150}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.3 + 0.05
  }));

  function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.fill();
      s.y -= s.speed;
      if (s.y < 0) { s.y = canvas.height; s.x = Math.random() * canvas.width; }
    });
    requestAnimationFrame(draw);
  }
  draw();
}

const vInput = document.getElementById("voidInput");
const hole = document.getElementById("blackhole");

vInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    const text = vInput.value.trim();
    if (!text) return;
    createVent(text);
    vInput.value = "";
  }
});

function createVent(text) {
  const el = document.createElement("div");
  el.className = "vent-text";
  el.innerText = text;
  document.body.appendChild(el);
  const i = vInput.getBoundingClientRect();
  const h = hole.getBoundingClientRect();
  el.style.left = i.left + "px";
  el.style.top = i.top + "px";
  el.style.setProperty("--dx", (h.left - i.left + h.width/2) + "px");
  el.style.setProperty("--dy", (h.top - i.top + h.height/2) + "px");
  setTimeout(() => el.remove(), 1600);
}

const uInput = document.getElementById("universeInput");

uInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    const text = uInput.value.trim();
    if (!text) return;
    launchPlane();
    uInput.value = "";
  }
});

function launchPlane() {
  const rect = uInput.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("width", "80");
  svg.setAttribute("height", "60");
  svg.setAttribute("viewBox", "0 0 80 60");
  svg.classList.add("plane-svg");
  svg.style.left = (cx - 40) + "px";
  svg.style.top = (cy - 30) + "px";

  const body = document.createElementNS(svgNS, "path");
  body.setAttribute("d", "M0 30 L80 0 L55 30 L80 60 Z");
  body.setAttribute("fill", "white");
  body.setAttribute("stroke", "#ccc");
  body.setAttribute("stroke-width", "1");

  const fold = document.createElementNS(svgNS, "path");
  fold.setAttribute("d", "M0 30 L55 30 L80 60");
  fold.setAttribute("fill", "#ddd");
  fold.setAttribute("stroke", "#bbb");
  fold.setAttribute("stroke-width", "0.5");

  svg.appendChild(body);
  svg.appendChild(fold);
  document.body.appendChild(svg);

  const dx = window.innerWidth * 0.5 - cx;
  const dy = -cy - 80;

  svg.style.setProperty("--dx", dx + "px");
  svg.style.setProperty("--dy", dy + "px");

  requestAnimationFrame(() => svg.classList.add("animate"));
  setTimeout(() => svg.remove(), 1900);
}
</script>
</body>
</html>
